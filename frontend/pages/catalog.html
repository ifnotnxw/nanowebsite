<section class="nf-page-catalog" aria-label="Каталог оборудования" data-i18n="catalog.aria" data-i18n-attr="aria-label">

  <!-- ═══ PHASE 1 · EQUIPMENT HUB ═══ -->
  <div class="nf-catalog-hub" id="catalogHub" hidden>
    <div class="nf-container nf-catalog-hub__container">
      <header class="nf-catalog-hub__header">
        <h1 class="nf-catalog-hub__h1" data-i18n="catalog.hub.h1">Каталог оборудования</h1>
        <p class="nf-catalog-hub__sub" data-i18n="catalog.hub.sub">Выберите клиническое направление</p>
      </header>
      <div class="nf-catalog-hub__grid" id="catalogHubGrid" role="list" aria-label="Клинические направления"></div>
    </div>
  </div>

  <!-- ═══ PHASE 2 · EXPLORER ═══ -->
  <div class="nf-catalog-explorer" id="catalogExplorer" hidden>

    <!-- ① Category heading — scrolls with page, sits above the sticky strip -->
    <div class="nf-catalog-explorer__head" id="catalogExplorerHead">
      <div class="nf-container nf-page-container--wide nf-catalog-explorer__head-inner">
        <nav class="nf-catalog-explorer__breadcrumb" id="catalogExplorerBreadcrumb" aria-label="Путь" hidden></nav>
        <h2 class="nf-catalog-explorer__title" id="catalogExplorerTitle"></h2>
        <p class="nf-catalog-explorer__desc" id="catalogExplorerDesc"></p>
      </div>
    </div>

    <!-- ② Sticky nav strip — sticks to top as user scrolls into products -->
    <div class="nf-catalog-strip" id="catalogStrip" role="navigation" aria-label="Навигация по направлениям">
      <div class="nf-container nf-catalog-strip__inner">
        <button type="button" class="nf-catalog-strip__back" id="catalogStripBack">
          <svg class="nf-catalog-strip__back-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span data-i18n="catalog.hub.title">Каталог</span>
        </button>
        <span class="nf-catalog-strip__sep" aria-hidden="true"></span>
        <div class="nf-catalog-strip__scroll" role="list" aria-label="Направления">
          <div class="nf-catalog-strip__items" id="catalogStripItems"></div>
        </div>
      </div>
    </div>

    <!-- ③ Products area -->
    <div class="nf-catalog-explorer__content">
      <div class="nf-container nf-catalog-layout nf-page-container--wide">

        <!-- Category rail — desktop/tablet sidebar; hidden on mobile via CSS -->
        <nav class="nf-cat-rail" id="catalogCatRail" aria-label="Категории каталога">
          <button type="button" class="nf-cat-rail__back" id="catalogRailBack" aria-label="Назад к каталогу">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span data-i18n="catalog.hub.title">Каталог</span>
          </button>
          <p class="nf-cat-rail__label" aria-hidden="true" data-i18n="catalog.rail.directions">Направления</p>
          <div class="nf-cat-rail__list" id="catalogRailItems" role="list"></div>
        </nav>

        <section class="nf-catalog-main nf-content-visibility-section">

          <div class="nf-catalog-toolbar">
            <div class="nf-toolbar-left">
              <span id="catalogCountLabel" class="nf-catalog-count"></span>
              <div id="catalogActiveFilters" class="nf-active-filters" role="list" aria-label="Активные фильтры"></div>
            </div>
            <div class="nf-toolbar-right">
              <div class="nf-toolbar-sort">
                <svg viewBox="0 0 16 16" fill="none" width="13" height="13" aria-hidden="true" class="nf-toolbar-sort__icon">
                  <path d="M2 4h12M4 8h8M6 12h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
                <select id="catalogSort" class="nf-toolbar-sort__select" aria-label="Сортировка">
                  <option value="popular"    data-i18n="catalog.sort.popular">По популярности</option>
                  <option value="name-asc"   data-i18n="catalog.sort.nameAsc">По названию (А–Я)</option>
                  <option value="name-desc"  data-i18n="catalog.sort.nameDesc">По названию (Я–А)</option>
                  <option value="price-asc"  data-i18n="catalog.sort.priceAsc">По цене (возр.)</option>
                  <option value="price-desc" data-i18n="catalog.sort.priceDesc">По цене (убыв.)</option>
                </select>
                <svg class="nf-toolbar-sort__chevron" viewBox="0 0 10 10" fill="none" width="10" height="10" aria-hidden="true">
                  <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="nf-toolbar-view" aria-label="Вид каталога">
                <button type="button" class="nf-toolbar-view__btn nf-view-switch-btn is-active" data-viewmode="grid" aria-label="Сетка">
                  <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
                    <rect x="2"  y="2"  width="5" height="5" rx="1.2" fill="currentColor"/>
                    <rect x="9"  y="2"  width="5" height="5" rx="1.2" fill="currentColor"/>
                    <rect x="2"  y="9"  width="5" height="5" rx="1.2" fill="currentColor"/>
                    <rect x="9"  y="9"  width="5" height="5" rx="1.2" fill="currentColor"/>
                  </svg>
                </button>
                <button type="button" class="nf-toolbar-view__btn nf-view-switch-btn" data-viewmode="list" aria-label="Список">
                  <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
                    <rect x="2" y="3.5"  width="12" height="1.8" rx="0.9" fill="currentColor"/>
                    <rect x="2" y="7.1"  width="12" height="1.8" rx="0.9" fill="currentColor"/>
                    <rect x="2" y="10.7" width="12" height="1.8" rx="0.9" fill="currentColor"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <div id="catalogProducts" class="nf-products-grid nf-catalog-grid"></div>

          <button type="button" id="catalogLoadMoreBtn" class="nf-catalog-load-more nf-hidden" hidden>
            <span data-i18n="catalog.loadMore">Показать ещё</span>
          </button>
          <div id="catalogPagination" class="nf-catalog-pagination"
            aria-label="Навигация по страницам каталога"
            data-i18n="catalog.paginationAria" data-i18n-attr="aria-label" hidden></div>

        </section>
      </div>
    </div>

  </div><!-- /nf-catalog-explorer -->

</section>
